version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: "%(asctime)s|%(levelname)s|%(name)s >>> %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  dataflow:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: __auto__
    mode: a

loggers:
  prod:
    level: DEBUG
    handlers: [dataflow]
    propagate: no

root:
  level: INFO
  handlers: [dataflow]
